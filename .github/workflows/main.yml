name: Build-Push

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build \
          -f app/Dockerfile \
          -t avadhootpatil/enterprise-app:${{ github.sha }} \
          app

    - name: Push Image
      run: |
        docker push \
        docker push avadhootpatil/enterprise-app:${{ github.sha }}

    - name: Update Helm
      run: |
        sed -i "s/tag:.*/tag: ${{ github.sha }}/g" helm/enterprise-app/values.yaml
