name: Build-Push

on:
push:
branches:
- main

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Debug Repository Structure
    run: |
      pwd
      ls -R
      find . -name Dockerfile

  - name: Login DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Image
    run: |
      docker build \
        -f enterprise-gitops-platform/app/Dockerfile \
        -t avadhootpatil/enterprise-app:${{ github.sha }} \
        enterprise-gitops-platform/app

  - name: Push Image
    run: |
      docker push avadhootpatil/enterprise-app:${{ github.sha }}
