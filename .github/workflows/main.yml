name: Build-Push

on:
push:
branches:
- main

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Login DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Debug Repository Structure
    run: |
      pwd
      find . -name Dockerfile

  - name: Build Image
    run: |
      docker build \
        -f app/Dockerfile \
        -t avadhootpatil/enterprise-app:${{ github.sha }} \
        app

  - name: Push Image
    run: |
      docker push avadhootpatil/enterprise-app:${{ github.sha }}

  - name: Update Helm Values
    run: |
      sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/enterprise-app/values.yaml

