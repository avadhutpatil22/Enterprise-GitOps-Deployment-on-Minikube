```
steps:
- name: Checkout Code
  uses: actions/checkout@v4

- name: Login DockerHub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}

- name: Build Image
  run: |
    docker build \
      -t avadhootpatil/enterprise-app:${{ github.sha }} \
      -f app/Dockerfile \
      app

- name: Push Image
  run: |
    docker push avadhootpatil/enterprise-app:${{ github.sha }}

- name: Update Helm Values
  run: |
    sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/enterprise-app/values.yaml


