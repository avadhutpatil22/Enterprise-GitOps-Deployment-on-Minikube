name: Build-Push

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Image
      run: |
        docker build \
           -t avadhootpatil/enterprise-app:${{ github.sha }} \
           -t avadhootpatil/enterprise-app:${{ github.sha }} \
           enterprise-gitops-platform/app

    - name: Push Image
      run: |
       docker push avadhootpatil/enterprise-app:${{ github.sha }}

    - name: Update Helm
      run: |
        sed -i "s/tag:.*/tag: ${{ github.sha }}/g" helm/enterprise-app/values.yaml
        
    - name: Commit Helm Changes
      run: |
         git config --global user.name "avadhutpatil22"
         git config --global user.email "patilavadhut907@gmail.com"
          
         git add helm/enterprise-app/values.yaml

         git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"

         git push
